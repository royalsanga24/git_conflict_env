  - id: medium_002
    grader: server.grader:GitConflictGrader_medium_002
  - id: medium_003
    grader: server.grader:GitConflictGrader_medium_003
  - id: medium_004
    grader: server.grader:GitConflictGrader_medium_004
  - id: medium_005
    grader: server.grader:GitConflictGrader_medium_005
  - id: hard_001
    grader: server.grader:GitConflictGrader_hard_001
  - id: hard_002
    grader: server.grader:GitConflictGrader_hard_002
  - id: hard_003
