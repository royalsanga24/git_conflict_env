spec_version: 1
name: git_conflict_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "Git merge conflict resolution environment — agents resolve real conflicts across Python, JS, CSS, JSON, YAML files with deterministic grading"
version: "0.1.0"

# Phase-2: one grader class per task so grade(None) probe scores are not all identical
# (hackathon disqualifies graders that always return the same score).
tasks:
  - id: easy_001
    grader: server.grader:GitConflictGrader_easy_001
  - id: easy_002
    grader: server.grader:GitConflictGrader_easy_002
  - id: easy_003
    grader: server.grader:GitConflictGrader_easy_003
  - id: easy_004
    grader: server.grader:GitConflictGrader_easy_004
  - id: easy_005
    grader: server.grader:GitConflictGrader_easy_005
