spec_version: 1
name: git_conflict_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "Git merge conflict resolution environment — agents resolve real conflicts across Python, JS, CSS, JSON, YAML files with deterministic grading"
version: "0.1.0"

# Phase-2: validator imports each grader class and calls Class().grade(None); the float
# must satisfy 0 < score < 1. This is not inference.py stdout.
x-grader: &default_grader server.grader:GitConflictGrader
tasks:
  - id: easy_001
    grader: *default_grader
  - id: easy_002
    grader: *default_grader
